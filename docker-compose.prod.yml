name: paismart

# ========================================================================
# PaiSmart 一键部署 compose（全栈：MySQL + Redis + Kafka + ES + MinIO + 后端 + 前端）
# 使用方式：
#   1. 复制 .env.deploy.example 为 .env，并填好 API Key / 服务器 IP
#   2. ./deploy.sh   （或手动 docker compose -f docker-compose.prod.yml up -d --build）
# ========================================================================

services:
  # ---------- 基础中间件 ----------
  mysql:
    image: mysql:8
    container_name: paismart-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-PaiSmart2025}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-PaiSmart}
      TZ: Asia/Shanghai
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --explicit_defaults_for_timestamp=true
      --lower_case_table_names=1
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-PaiSmart2025}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [paismart-net]

  redis:
    image: redis:7.0.11
    container_name: paismart-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-PaiSmart2025}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-PaiSmart2025}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [paismart-net]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: paismart-minio
    restart: always
    ports:
      # 19000：S3 API（浏览器下载文件时用的 presigned URL 会指向这里）
      - "${MINIO_API_PORT:-19000}:19000"
      # 19001：MinIO Web 控制台（可选）
      - "${MINIO_CONSOLE_PORT:-19001}:19001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-PaiSmart2025}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":19001" --address ":19000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [paismart-net]

  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: paismart-kafka
    restart: always
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=CONTROLLER://:9093,PLAINTEXT://:9092
      # 注意：后端在同一个 docker 网络里，通过 kafka:9092 访问
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks: [paismart-net]

  elasticsearch:
    image: elasticsearch:8.10.4
    container_name: paismart-es
    restart: always
    environment:
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD:-PaiSmart2025}
      - node.name=paismart-es01
      - discovery.type=single-node
      - xpack.license.self_generated.type=basic
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - cluster.name=paismart-es-cluster
      - ES_JAVA_OPTS=-Xms${ES_HEAP_SIZE:-1g} -Xmx${ES_HEAP_SIZE:-1g}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    command: >
      bash -c "
      if ! elasticsearch-plugin list | grep -q 'analysis-ik'; then
        echo 'Installing analysis-ik plugin...';
        elasticsearch-plugin install --batch https://release.infinilabs.com/analysis-ik/stable/elasticsearch-analysis-ik-8.10.4.zip || true;
      fi;
      /usr/local/bin/docker-entrypoint.sh
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTICSEARCH_PASSWORD:-PaiSmart2025} http://localhost:9200/_cluster/health | grep -q '\"status\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks: [paismart-net]

  # ---------- 应用 ----------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      # 构建阶段走宿主机网络，绕开某些环境下 docker 内置 DNS / 80 端口被 TUN 劫持的坑
      network: host
    image: paismart-backend:latest
    container_name: paismart-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081

      # MySQL
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-PaiSmart}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-PaiSmart2025}

      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-PaiSmart2025}

      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_TOPIC_PARTITIONS: 1
      SPRING_KAFKA_TOPIC_REPLICATION_FACTOR: 1

      # MinIO（注意：publicUrl 要用宿主机 IP，因为前端会直接 GET 这个地址）
      MINIO_ENDPOINT: http://minio:19000
      # 浏览器访问 MinIO 走前端 nginx 的 /minio-proxy 反向代理
      # 这样签名里的 Host=minio:19000 会在 nginx 层保持一致，避免 SignatureDoesNotMatch
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://${SERVER_IP:-127.0.0.1}/minio-proxy}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-PaiSmart2025}
      MINIO_BUCKET_NAME: uploads

      # Elasticsearch（容器内用 http）
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_SCHEME: http
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:-PaiSmart2025}
      ELASTICSEARCH_INSECURE_TRUST_ALL_CERTIFICATES: "false"

      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

      # XHS cookie 池加密密钥（AES-GCM，≥32 字节随机串）
      # deploy.sh 首次启动会自动生成；未配置时前端会在 /xhs-cookies 页面红字告警
      XHS_COOKIE_SECRET: ${XHS_COOKIE_SECRET:-}

      # XHS 扫码登录（后端代理 headless Chromium 采 cookie，默认开启）
      SMARTPAI_XHS_LOGIN_ENABLED: ${SMARTPAI_XHS_LOGIN_ENABLED:-true}
      SMARTPAI_XHS_LOGIN_EXPIRES_SECONDS: ${SMARTPAI_XHS_LOGIN_EXPIRES_SECONDS:-180}
      SMARTPAI_XHS_LOGIN_SKILL_PATH: /app/skills-bundled/xhs-qr-login/run.mjs
      SMARTPAI_XHS_LOGIN_NODE_MODULES_PATH: /app/skills-bundled/xhs-qr-login/node_modules
      SMARTPAI_XHS_LOGIN_BROWSERS_PATH: /ms-playwright
      SMARTPAI_XHS_LOGIN_DEFAULT_PLATFORMS: xhs_pc,xhs_creator,xhs_pgy,xhs_qianfan

      # ---------- 聚光 MarketingAPI 凭证 pass-through ----------
      # Spring 通过 XHS_SPOTLIGHT_* 读取；compose 默认不透传 .env，必须显式列出才能进容器
      XHS_SPOTLIGHT_SEED_ENABLED: ${XHS_SPOTLIGHT_SEED_ENABLED:-false}
      XHS_SPOTLIGHT_SEED_ORG: ${XHS_SPOTLIGHT_SEED_ORG:-default}
      XHS_SPOTLIGHT_SEED_LABEL: ${XHS_SPOTLIGHT_SEED_LABEL:-seed-env-spotlight}
      XHS_SPOTLIGHT_SEED_PRIORITY: ${XHS_SPOTLIGHT_SEED_PRIORITY:-20}
      XHS_SPOTLIGHT_ADVERTISER_ID: ${XHS_SPOTLIGHT_ADVERTISER_ID:-}
      XHS_SPOTLIGHT_ACCESS_TOKEN: ${XHS_SPOTLIGHT_ACCESS_TOKEN:-}
      XHS_SPOTLIGHT_REFRESH_TOKEN: ${XHS_SPOTLIGHT_REFRESH_TOKEN:-}
      XHS_SPOTLIGHT_EXPIRES_AT: ${XHS_SPOTLIGHT_EXPIRES_AT:-}
      XHS_SPOTLIGHT_DEFAULT_TTL_SECONDS: ${XHS_SPOTLIGHT_DEFAULT_TTL_SECONDS:-7200}
      XHS_SPOTLIGHT_APP_ID: ${XHS_SPOTLIGHT_APP_ID:-}
      XHS_SPOTLIGHT_APP_SECRET: ${XHS_SPOTLIGHT_APP_SECRET:-}

      # Skill 子系统
      SKILLS_ENABLED: ${SKILLS_ENABLED:-true}
      SKILLS_ROOT_USER: /app/skills
      SKILLS_ROOT_BUNDLED: /app/skills-bundled
      BASH_ENABLED: ${BASH_ENABLED:-true}
      BASH_TIMEOUT_SECONDS: ${BASH_TIMEOUT_SECONDS:-60}
      BASH_SANDBOX_ROOT: /app/var/agent-sandbox

      # 管理员引导（首次启动 ENABLED=true 自动创建 admin，创建成功后请改回 false 再重启）
      ADMIN_BOOTSTRAP_ENABLED: ${ADMIN_BOOTSTRAP_ENABLED:-true}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-admin}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      ADMIN_BOOTSTRAP_PRIMARY_ORG: default
      ADMIN_BOOTSTRAP_ORG_TAGS: default,admin

      # 注册模式：OPEN（开放）/ INVITE_ONLY（邀请码）/ CLOSED（关闭）
      APP_AUTH_REGISTRATION_MODE: ${APP_AUTH_REGISTRATION_MODE:-OPEN}
      APP_AUTH_INVITE_REQUIRED: ${APP_AUTH_INVITE_REQUIRED:-false}

      # 跨域白名单：带上你的服务器 IP
      SECURITY_ALLOWED_ORIGINS: ${SECURITY_ALLOWED_ORIGINS:-http://localhost:*,http://127.0.0.1:*}

      # AI 配置
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_API_MODEL: ${DEEPSEEK_API_MODEL:-deepseek-chat}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      EMBEDDING_API_MODEL: ${EMBEDDING_API_MODEL:-text-embedding-v4}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      # 向量维度（text-embedding-v4=2048, Qwen3-Embedding-0.6B=1024, bge-large-zh-v1.5=1024 等）
      # 换模型后务必改这里，并删除 ES 旧索引重建
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-2048}

      # 启动知识库引导：首次部署 / 换了 embedding 模型 建议保持 false
      KNOWLEDGE_BOOTSTRAP_ENABLED: ${KNOWLEDGE_BOOTSTRAP_ENABLED:-false}

      # ===== Token 配额 =====
      # false = 每日重置模式（配合下面两个 enabled=false 就是"无限制"）
      # true  = 用户余额模式（开局发 init-tokens，用完就不能再用，默认 10000）
      USAGE_QUOTA_USE_USER_TOKEN_BALANCE: ${USAGE_QUOTA_USE_USER_TOKEN_BALANCE:-false}
      USAGE_QUOTA_LLM_ENABLED: ${USAGE_QUOTA_LLM_ENABLED:-false}
      USAGE_QUOTA_EMBEDDING_ENABLED: ${USAGE_QUOTA_EMBEDDING_ENABLED:-false}
      USAGE_QUOTA_LLM_DAY_MAX_TOKENS: ${USAGE_QUOTA_LLM_DAY_MAX_TOKENS:-300000}
      USAGE_QUOTA_EMBEDDING_DAY_MAX_TOKENS: ${USAGE_QUOTA_EMBEDDING_DAY_MAX_TOKENS:-1000000}
      USAGE_QUOTA_LLM_INIT_TOKENS: ${USAGE_QUOTA_LLM_INIT_TOKENS:-10000}
      USAGE_QUOTA_EMBEDDING_INIT_TOKENS: ${USAGE_QUOTA_EMBEDDING_INIT_TOKENS:-10000}

      # 日志
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-INFO}
      LOG_LEVEL_WEB: WARN
      LOG_LEVEL_SECURITY: WARN
      LOG_LEVEL_AUTOCONFIG: WARN
      LOG_LEVEL_MINIO: WARN
      SPRING_JPA_SHOW_SQL: "false"

      # JVM
      JAVA_XMS: ${JAVA_XMS:-512m}
      JAVA_XMX: ${JAVA_XMX:-1g}
    ports:
      # 可选直连（前端已经通过 nginx 代理 /api，此端口主要用于调试）
      - "${BACKEND_PORT:-8081}:8081"
    # xhs-qr-login 跑 headless Chromium，默认 /dev/shm 太小（64M）
    # 页面稍多就会 "Target page, context or browser has been closed"，给到 2G 足够
    shm_size: "2gb"
    volumes:
      # 用户自定义 skill（放进宿主机 ./skills 即可热加载，不需要重建镜像）
      - ./skills:/app/skills
      # agent sandbox 工作区（BashExecutor 每个 session 会在这里建独立子目录）
      - agent-sandbox:/app/var/agent-sandbox
    healthcheck:
      # 后端没启用 actuator，用 TCP 端口探测更可靠
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8081' || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks: [paismart-net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: paismart-frontend:latest
    container_name: paismart-frontend
    restart: always
    depends_on:
      - backend
    ports:
      # 浏览器访问入口：http://SERVER_IP:${WEB_PORT}
      - "${WEB_PORT:-80}:80"
    networks: [paismart-net]

volumes:
  mysql-data:
  redis-data:
  minio-data:
  kafka-data:
  es-data:
  agent-sandbox:

networks:
  paismart-net:
    driver: bridge
