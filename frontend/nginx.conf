server {
    listen 80;
    server_name _;

    client_max_body_size 200m;

    # 前端静态资源（SPA，刷新路由时回退到 index.html）
    root /usr/share/nginx/html;
    index index.html;

    # nginx 默认 mime.types 不包含 .mjs，会把 ES module worker 当成 application/octet-stream
    # 导致浏览器拒绝加载（pdf.js 报 "Setting up fake worker failed"）
    # 这里用 location 精确匹配 .mjs 文件并强制正确的 Content-Type
    # 同时下发 no-cache，避免浏览器用上次错误响应里的 octet-stream 旧缓存
    location ~ \.mjs$ {
        default_type application/javascript;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # index.html 绝对不缓存：否则浏览器会一直用旧 HTML 指向早已被删掉的 chunk，
    # 导致路由找不到（例如新加的 agent-project-detail 点击没反应）。
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # hash 过的静态资源（/assets/xxx-HASH.js|.css|.png|...）可以长缓存
    location ~* ^/assets/.+\.(?:js|css|png|jpe?g|svg|gif|webp|ico|woff2?|ttf|eot|otf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 REST API
    location /api/ {
        proxy_pass http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # MinIO 文件代理：解决 presigned URL 签名里的 host 和浏览器访问地址不一致导致的 403
    # 浏览器请求 /minio-proxy/uploads/xxx?X-Amz-Signature=...
    # nginx 改写路径并把 Host 头固定为 minio:19000（与后端签名时使用的 endpoint 保持一致）
    # 这样 MinIO 端校验签名就能匹配上
    location /minio-proxy/ {
        # MinIO 预签名 URL 只对 GET 方法签名；pdf.js 启动时会先发 HEAD 探测
        # HEAD 跟签名方法不匹配会被 MinIO 403，这里直接兜一个 200 绕过
        if ($request_method = HEAD) {
            add_header Accept-Ranges "bytes" always;
            return 200;
        }

        rewrite ^/minio-proxy/(.*)$ /$1 break;

        proxy_pass http://minio:19000;
        proxy_http_version 1.1;
        proxy_set_header Host "minio:19000";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # WebSocket 聊天通道：/proxy-ws/chat/{token} -> 后端 /chat/{token}
    location /proxy-ws {
        rewrite ^/proxy-ws(/.*)$ $1 break;

        proxy_pass http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
